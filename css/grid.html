<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box
        {
            width: 400px;
            height: 400px;
            border: 1px solid black;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(3,1fr);
            grid-gap: 10px;
        }

        #a
        {
            grid-column: 1/3;
            grid-row: 1/3;
        }
        #f
        {
            grid-column:1/-1;
        }
    </style>
</head>
<body>
    <div class="box">
        <div id="a" style="background-color: red;"></div>
        <div id="b" style="background-color: green;"></div>
        <div id="c" style="background-color: blue;"></div>
        <div id="d" style="background-color: yellow;"></div>
        <div id="e" style="background-color: cyan;"></div>
        <div id="f" style="background-color: magenta;"></div>
      
    </div>
</body>
</html>
