<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .box
        {
            width: 1000px;
            height: 1000px;
            border: 15px solid black;
            margin: 20px auto;
           background-color:black;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(3,1fr);
            grid-gap: 10px;
           
             border-radius:5%;
        }
        #box4
        {
            grid-column: 2/3;
            grid-row: 2/3;
            color: white;
            padding: 55px;
            font-size : 30px;
            border-radius:5%;

        }
        #box5
        {
            grid-column: 3/4;
            grid-row: 2/4;
            font-size : 40px;
            display: flex;
            justify-content: center;
             align-items: end;
              border-radius:5%;
        }
        #box6
        {
            grid-column:1/3;
            color: white;
            padding: 20px;
            font-size : 30px;
             border-radius:5%;
        }
        #box2
        {
            font-size: 50px;
            color:white;
            padding-left:15px;
             border-radius:5%;
             display : flex;
             flex-direction:column;
             justify-content: center;
             align-items:center;
        }
        #box3
        {
            font-size: 50px;
            color:white;
            padding-left:15px;
             border-radius:5%;
        }
        #box1
        {
            font-size: 30px;
            color:white;
            padding-left:15px;
             border-radius:5%;
        }
        #b1
        {
            font-size:34px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div style="background-color: purple;"></div>
        <div id="box2" style="background-color: purple;">
            <h1>25K</h1>
            <div id="b1"><h6>Weekly Viewers</h6></div>
        </div>
        <div id="box3" style="background-color: purple;">
            <h1>50K</h1>
        </div>
        <div id="box1" style="background-color: purple;">
            <h1>1538</h1>
        </div>
        <div id="box4" style="background-color: blue;">
            <h1>DESIGN</h1>
        </div>
        <div id="box5" style="background-color: white;">
            <h1>200K</h1>
        </div>
        <div id="box6" style="background-color: purple;">
            <h1>A place to learn UI Design and Web Design</h1>
        </div>
    </div>
</body>
</html>
