<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Navbar</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      padding: 20px;
      background-color: #f4f4f4;
    }

    .navbar{
      border: 1px solid black;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 15px;
      background-color: #1e293b;
    }

    .logo{
      border: 1px solid white;
      padding: 10px;
      color: white;
      font-size: 24px;
    }

    .nav-links{
      border: 1px solid white;

      display: flex;
      gap: 20px;

      list-style: none;
      padding: 10px;
    }

    .nav-links li{
      border: 1px solid white;
      padding: 8px;
    }

    .nav-links a{
      text-decoration: none;
      color: white;
    }

    .btn{
      border: 1px solid white;

      text-decoration: none;
      color: white;

      padding: 10px 15px;
    }
    .container1
    {
      display: flex;
      flex-wrap: wrap;
    }
    .container2
    {
      display: flex;
      flex-wrap: wrap;

    }
    .box1
    {
        margin-top: 20px;
