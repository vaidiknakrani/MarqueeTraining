<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            grid-template-rows: repeat(4,1fr);
            grid-template-areas:
                "kashmir kashmir mp mp"
                "kashmir kashmir mp mp"
                "rajasthan rajasthan rajasthan rajasthan"
                "bihar bihar uttarkhand uttarkhand";
                gap:12px;
                height:100vh;
            border:5px solid black;
            background-color:black;
        }
        .kashmir{
            grid-area:kashmir;
            background-color:lightblue;
        }
        .mp{
            grid-area:mp;
            background-color:lightgreen;
        }
        .rajasthan{
            grid-area:rajasthan;
            background-color:lightcoral;

        }
        .bihar{
            grid-area:bihar;
            background-color:LightYellow;
        }
        .uttarkhand{
            grid-area:uttarkhand;
            background-color:lightblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="kashmir"><h1>Kashmir</h1></div>
        <div class="mp"><h1>Madhya Pradesh</h1></div>
        <div class="rajasthan"><h1>Rajasthan</h1></div>
        <div class="bihar"><h1>Bihar</h1></div>
        <div class="uttarkhand"><h1>Uttarakhand</h1></div>
    </div>
    
</body>
</html>
