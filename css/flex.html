<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Box</title>

    <style>
        .container {
            width: 500px;
            height: 500px;
            background-color: yellow;

            display: flex;
            justify-content: space-evenly; /* horizontal center */
            align-items: center;     /* vertical center */
            flex-wrap: wrap;
            flex-direction: column;
        }

        .box {
            width: 120px;
            height: 120px;
            background-color: red;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
