<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Example</title>
  <style>
    .container {
      width: 700px;
      height: 400px;
      display: grid;
      margin: 20px auto;
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-rows: 1fr 2fr 1fr;
      gap: 12px;
      border: 12px solid black;
       background-color: lightblue;
    }

   
    #a
    {
        height:30%;
        width:30%;
        justify-self: end;
        align-self: end;
        
    }
    #b
    {
        height:30%;
        width:30%;
        place-self:center;
        
    }
    #c
    {
        height:30%;
        width:30%;
        justify-self:end;
       
    } 
    #d
    {
        height:30%;
        width:30%;
       justify-self:start;
        align-self:center;    }
    #e{
        height:30%;
        width:30%;
        align-self:center;
        justify-self:end;
    }
    #f{
         height:30%;
        width:30%;
       justify-self:start;
        align-self:center; 
    }
    #g{
        height:30%;
        width:30%;
         justify-self:start;
        align-self:end;
    }
    #h{
        height:30%;
        width:30%;
        justify-self:center;
    }
    #i{
         height:30%;
        width:30%;
        align-self:center;
        justify-self:end;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id = "a"></div>
    <div id="b"></div>
    <div id = "c"></div>
    <div id = "d"></div>
    <div id = "e"></div>
    <div id = "f"></div>
    <div id = "g"></div>
    <div id = "h"></div>
    <div id = "i"></div>
  </div>
</body>
</html>
